{% extends "base.html" %}
{% block title %}Staff Login – Tomorrow World{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm border-0">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="bi bi-person-lock display-4 text-navy"></i>
            <h3 class="fw-bold text-navy mt-2">Staff Login</h3>
            <p class="text-muted small">Tomorrow World internal staff only</p>
          </div>
          <form method="POST">
            <div class="mb-3">
              <label class="form-label required">Username</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label required">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
              </div>
            </div>
            <div class="mb-3">
              <div class="form-check">
                <input type="checkbox" name="remember" id="remember" class="form-check-input">
                <label class="form-check-label small" for="remember">Remember me</label>
              </div>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-navy btn-lg">
                <i class="bi bi-box-arrow-in-right me-2"></i>Log In
              </button>
            </div>
          </form>
          <hr>
          <div class="text-center">
            <a href="{{ url_for('index') }}" class="text-muted small">
              <i class="bi bi-arrow-left me-1"></i>Back to Home
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
